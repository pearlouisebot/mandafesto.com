<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Mandafesto</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 48px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD700, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .login-subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 0.9em;
            font-weight: 300;
            margin-bottom: 32px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .login-form input {
            padding: 14px 18px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95em;
            outline: none;
            transition: border-color 0.2s;
        }

        .login-form input::placeholder { color: rgba(255,255,255,0.3); }
        .login-form input:focus { border-color: #FFD700; }

        .login-form button {
            padding: 14px 24px;
            border-radius: 8px;
            border: none;
            background: #FFD700;
            color: #000;
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }

        .login-form button:hover { opacity: 0.85; }
        .login-form button:disabled { opacity: 0.4; cursor: not-allowed; }

        .login-msg {
            font-size: 0.85em;
            min-height: 1.5em;
            margin-top: 16px;
            font-weight: 300;
        }

        .login-msg.success { color: #4ade80; }
        .login-msg.error { color: #f87171; }

        .back-link {
            position: absolute;
            top: 24px;
            left: 24px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.85em;
            transition: color 0.2s;
        }

        .back-link:hover { color: #FFD700; }

        @media (max-width: 480px) {
            .login-container { 
                margin: 24px;
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <a href="../" class="back-link">← Back to Mandafesto</a>
    
    <div class="login-container">
        <h1 class="login-title">Admin Login</h1>
        <p class="login-subtitle">Enter your email to receive a magic link</p>
        
        <form class="login-form" id="loginForm">
            <input 
                type="email" 
                id="email" 
                placeholder="amanda.bradford@gmail.com" 
                required 
                autocomplete="email"
            >
            <button type="submit" id="loginBtn">Send Magic Link</button>
        </form>
        
        <p class="login-msg" id="loginMsg"></p>
    </div>

    <script>
        // Check if already authenticated
        const token = localStorage.getItem('mandafesto_auth_token');
        if (token) {
            // Verify token is still valid and redirect to dashboard
            verifyTokenAndRedirect(token);
        }

        // Check for magic link in URL
        const urlParams = new URLSearchParams(window.location.search);
        const magicToken = urlParams.get('token');
        if (magicToken) {
            verifyMagicLink(magicToken);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('loginMsg');
            
            if (!email) return;
            
            btn.disabled = true;
            btn.textContent = 'Sending...';
            msg.textContent = '';
            msg.className = 'login-msg';
            
            try {
                const response = await fetch('https://kxyqdzkoyuzszcyfvpee.supabase.co/rest/v1/rpc/send_magic_link', {
                    method: 'POST',
                    headers: {
                        'apikey': 'sb_publishable_aXDS4SvG7aMZKExyNPTbgA_mBzZdQZU',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        user_email: email,
                        site_name: 'Mandafesto',
                        redirect_url: window.location.href 
                    })
                });
                
                if (response.ok) {
                    msg.textContent = 'Magic link sent! Check your email.';
                    msg.className = 'login-msg success';
                    document.getElementById('email').value = '';
                } else {
                    throw new Error('Failed to send magic link');
                }
            } catch (error) {
                msg.textContent = 'Error sending magic link. Try again.';
                msg.className = 'login-msg error';
                console.error('Magic link error:', error);
            }
            
            btn.disabled = false;
            btn.textContent = 'Send Magic Link';
        });

        async function verifyMagicLink(token) {
            const msg = document.getElementById('loginMsg');
            msg.textContent = 'Verifying magic link...';
            msg.className = 'login-msg';
            
            try {
                const response = await fetch('https://kxyqdzkoyuzszcyfvpee.supabase.co/rest/v1/rpc/verify_magic_link', {
                    method: 'POST',
                    headers: {
                        'apikey': 'sb_publishable_aXDS4SvG7aMZKExyNPTbgA_mBzZdQZU',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ magic_token: token })
                });
                
                const result = await response.json();
                
                if (response.ok && result.valid) {
                    // Store auth token
                    localStorage.setItem('mandafesto_auth_token', result.session_token);
                    localStorage.setItem('mandafesto_auth_expires', result.expires_at);
                    
                    msg.textContent = 'Login successful! Redirecting...';
                    msg.className = 'login-msg success';
                    
                    setTimeout(() => {
                        window.location.href = './dashboard.html';
                    }, 1000);
                } else {
                    throw new Error('Invalid or expired magic link');
                }
            } catch (error) {
                msg.textContent = 'Invalid or expired magic link.';
                msg.className = 'login-msg error';
                console.error('Magic link verification error:', error);
                
                // Clear URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        async function verifyTokenAndRedirect(token) {
            try {
                const expires = localStorage.getItem('mandafesto_auth_expires');
                if (expires && new Date() > new Date(expires)) {
                    throw new Error('Token expired');
                }
                
                // For now, just redirect if token exists
                // In production, you'd verify with server
                window.location.href = './dashboard.html';
            } catch (error) {
                // Clear expired/invalid token
                localStorage.removeItem('mandafesto_auth_token');
                localStorage.removeItem('mandafesto_auth_expires');
            }
        }
    </script>
</body>
</html>
